name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Format, Lint, Typecheck, Test, Browser Test, Build
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: package.json

      - name: Cache Bun and Turbo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.bun/install/cache
            .turbo
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-${{ hashFiles('turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify Scient upstream ownership and review state
        run: |
          git remote add upstream https://github.com/Emanuele-web04/synara.git
          git remote set-url --push upstream DISABLED
          bun run scient:upstream-check

      - name: Verify Linux terminal PTY native dependency
        if: runner.os == 'Linux'
        run: node scripts/node-pty-smoke.mjs

      - name: Verify Scient identity
        run: bun run brand:check

      - name: Verify immutable workflow actions
        run: bun run workflow:check

      - name: Format
        run: bun run fmt:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      # Run the workspace-local playwright binary directly: bunx stalled after
      # the chromium download on hosted runners. The step timeout stops any
      # remaining apt/download stalls from eating the whole job budget.
      - name: Install browser test runtime
        timeout-minutes: 15
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          cd apps/web
          ./node_modules/.bin/playwright install --with-deps chromium

      # Blocking product-behavior coverage. Linux-only pixel/font/layout
      # comparisons run separately below while their rendering is quarantined.
      - name: Browser test (stable)
        timeout-minutes: 20
        run: bun run --cwd apps/web test:browser:stable

      # Pixel/font/layout comparisons are tracked explicitly in
      # apps/web/BROWSER_TEST_QUARANTINE.md while their Linux rendering is fixed.
      - name: Browser test (Linux geometry quarantine)
        continue-on-error: true
        timeout-minutes: 10
        run: bun run --cwd apps/web test:browser:geometry

      - name: Build desktop pipeline
        run: bun run build:desktop

      - name: Verify preload bundle output
        run: |
          test -f apps/desktop/dist-electron/preload.js
          grep -nE "desktopBridge|getWsUrl|PICK_FOLDER_CHANNEL|wsUrl" apps/desktop/dist-electron/preload.js

  html_preview_platform:
    name: HTML Preview Platform Smoke (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux
            runner: ubuntu-24.04
          - label: Windows
            runner: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: package.json

      - name: Install Linux listener tools
        if: runner.os == 'Linux'
        shell: bash
        run: |
          command -v lsof >/dev/null 2>&1 || {
            sudo apt-get update
            sudo apt-get install -y lsof
          }

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Exercise native localhost preview and discovery
        run: bun run --cwd apps/server test:html-preview-platform

  windows_process:
    name: Windows Process Regression
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test Windows process planning
        run: bun run --cwd packages/shared test src/windowsProcess.test.ts

      - name: Test Effect Windows process spawn
        run: bun run --cwd apps/server test src/windowsProcessEffect.test.ts

      - name: Test Windows provider runtime discovery
        run: bun run --cwd apps/server test src/provider/Layers/ProviderRuntimeManager.test.ts

      - name: Test Windows private state initialization
        run: |
          bun run --cwd apps/server test src/serverPrivateDirectories.test.ts
          bun run --cwd apps/desktop test src/desktopScientDataDirectories.test.ts

      - name: Test Windows backend lifecycle
        run: |
          bun run --cwd apps/desktop test src/desktopBackendSupervisor.test.ts src/backendProcessTree.test.ts
          bun run --cwd apps/server test src/desktopParentShutdown.test.ts

      - name: Exercise Windows release staging
        run: bun run release:smoke

  release_smoke:
    name: Release Smoke
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Verify Scient identity
        run: bun run brand:check

      - name: Exercise release-only workflow steps
        run: node scripts/release-smoke.ts
