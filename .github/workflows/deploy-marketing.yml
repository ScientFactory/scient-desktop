name: Deploy ScientFactory Website

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-marketing.yml"
      - "apps/marketing/**"
      - "functions/**"
      - "worker-configuration.d.ts"
      - "wrangler.jsonc"
      - "package.json"
      - "bun.lock"
  workflow_dispatch:

concurrency:
  group: scientfactory-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Test, Build, and Deploy
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment:
      name: scientfactory.com
      url: https://scientfactory.com
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify marketing release integration
        run: |
          bun run --cwd apps/marketing test
          bun run test:marketing:edge
          bun run typecheck:marketing:edge

      - name: Build production website
        run: bun run build:marketing

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DEPLOY_COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'Manual ScientFactory deployment' }}
        run: >-
          bun x wrangler pages deploy apps/marketing/dist
          --project-name scientfactory
          --branch main
          --commit-hash "$GITHUB_SHA"
          --commit-message "$DEPLOY_COMMIT_MESSAGE"
