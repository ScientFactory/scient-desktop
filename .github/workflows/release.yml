name: Release Desktop

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example 1.2.3 or v1.2.3)"
        required: true
        type: string
      publish_release:
        description: "Publish the GitHub/npm release after successful builds"
        required: true
        default: false
        type: boolean
      allow_unsigned_release:
        description: "Allow an unsigned Windows installer for this manual early-access release (macOS always requires signing)"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

concurrency:
  group: scient-desktop-release
  cancel-in-progress: false

env:
  RELEASE_BRANCH: release/stable

jobs:
  preflight:
    name: Preflight
    if: ${{ vars.SCIENT_DESKTOP_RELEASES_ENABLED == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      version: ${{ steps.release_meta.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
      is_prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
      make_latest: ${{ steps.release_meta.outputs.make_latest }}
      mirror_to_stable_channel: ${{ steps.release_meta.outputs.mirror_to_stable_channel }}
      publish_release: ${{ steps.release_mode.outputs.publish_release }}
      unsigned_release: ${{ steps.release_mode.outputs.unsigned_release }}
      release_lane: ${{ steps.release_meta.outputs.release_lane }}
      bridge_tag: ${{ steps.release_meta.outputs.bridge_tag }}
      update_channel: ${{ steps.release_meta.outputs.update_channel }}
      update_repository: ${{ steps.release_config.outputs.update_repository }}
      ref: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - id: release_config
        name: Verify Scient release configuration
        shell: bash
        env:
          UPDATE_REPOSITORY: ${{ vars.SCIENT_DESKTOP_UPDATE_REPOSITORY }}
        run: |
          set -euo pipefail
          if [[ -z "$UPDATE_REPOSITORY" ]]; then
            echo "Set the SCIENT_DESKTOP_UPDATE_REPOSITORY repository variable before enabling Scient desktop releases." >&2
            exit 1
          fi
          if [[ "$UPDATE_REPOSITORY" != "$GITHUB_REPOSITORY" ]]; then
            echo "The updater repository must be the owned release repository $GITHUB_REPOSITORY, got $UPDATE_REPOSITORY." >&2
            exit 1
          fi
          echo "update_repository=$UPDATE_REPOSITORY" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: package.json

      - id: release_mode
        name: Resolve publication mode
        shell: bash
        env:
          PUBLISH_RELEASE: ${{ github.event_name == 'push' || inputs.publish_release }}
          ALLOW_UNSIGNED_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_unsigned_release || false }}
        run: |
          set -euo pipefail
          echo "publish_release=$PUBLISH_RELEASE" >> "$GITHUB_OUTPUT"
          echo "unsigned_release=$ALLOW_UNSIGNED_RELEASE" >> "$GITHUB_OUTPUT"
          if [[ "$ALLOW_UNSIGNED_RELEASE" == "true" && "$PUBLISH_RELEASE" != "true" ]]; then
            echo "Unsigned publication can only be enabled for a publishing run." >&2
            exit 1
          fi
          if [[ "$PUBLISH_RELEASE" == "true" ]]; then
            if [[ "$ALLOW_UNSIGNED_RELEASE" == "true" ]]; then
              echo "Unsigned early-access publication explicitly enabled."
            else
              echo "Signed publication enabled."
            fi
          else
            echo "Build-only validation enabled; no release or package will be published."
          fi

      - name: Verify publication source
        if: ${{ steps.release_mode.outputs.publish_release == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            "refs/heads/${RELEASE_BRANCH}:refs/remotes/origin/${RELEASE_BRANCH}"
          release_branch_sha="$(git rev-parse "refs/remotes/origin/${RELEASE_BRANCH}")"

          if [[ "$GITHUB_SHA" != "$release_branch_sha" ]]; then
            echo "Public releases must use the exact head of ${RELEASE_BRANCH}." >&2
            echo "Workflow source: $GITHUB_SHA" >&2
            echo "${RELEASE_BRANCH}: $release_branch_sha" >&2
            exit 1
          fi

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && "$GITHUB_REF" != "refs/heads/${RELEASE_BRANCH}" ]]; then
            echo "Manual publication must be dispatched from ${RELEASE_BRANCH}, got ${GITHUB_REF}." >&2
            exit 1
          fi

          echo "Publication source verified at ${RELEASE_BRANCH} (${release_branch_sha})."

      - id: release_meta
        name: Resolve release policy
        env:
          RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
        run: node scripts/resolve-release-update-policy.ts "$RELEASE_VERSION"

      - name: Verify public updater repository
        env:
          GH_TOKEN: ${{ github.token }}
          UPDATE_REPOSITORY: ${{ steps.release_config.outputs.update_repository }}
        run: |
          visibility="$(gh api "repos/${UPDATE_REPOSITORY}" --jq .visibility)"
          if [[ "$visibility" != "public" ]]; then
            echo "The dedicated updater channel requires the public GitHub provider; repository visibility is $visibility." >&2
            exit 1
          fi

      - name: Verify pinned compatibility feed
        if: ${{ steps.release_meta.outputs.release_lane == 'clean' && steps.release_mode.outputs.publish_release == 'true' && steps.release_meta.outputs.mirror_to_stable_channel == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          BRIDGE_TAG: ${{ steps.release_meta.outputs.bridge_tag }}
          UPDATE_CHANNEL: ${{ steps.release_meta.outputs.update_channel }}
        run: |
          actual_latest="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)"
          if [[ "$actual_latest" != "$BRIDGE_TAG" ]]; then
            echo "Expected GitHub Latest to remain pinned to $BRIDGE_TAG, got $actual_latest." >&2
            exit 1
          fi

          bridge_release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${BRIDGE_TAG}" --jq .id)"
          bridge_assets="$(
            gh api --paginate \
              "repos/${GITHUB_REPOSITORY}/releases/${bridge_release_id}/assets?per_page=100" \
              --jq '.[].name'
          )"
          required_assets=(
            latest-mac.yml
            latest.yml
            latest-linux.yml
            "${UPDATE_CHANNEL}-mac.yml"
            "${UPDATE_CHANNEL}.yml"
            "${UPDATE_CHANNEL}-linux.yml"
          )
          for required_asset in "${required_assets[@]}"; do
            if ! grep -Fxq "$required_asset" <<< "$bridge_assets"; then
              echo "Pinned compatibility feed is missing $required_asset." >&2
              exit 1
            fi
          done

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify Scient identity
        run: bun run brand:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

  build:
    name: Build ${{ matrix.label }}
    needs: preflight
    runs-on: ${{ matrix.runner }}
    timeout-minutes: ${{ matrix.timeout_minutes }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            runner: macos-14
            platform: mac
            target: dmg
            arch: arm64
            timeout_minutes: 120
          - label: macOS x64
            runner: macos-15-intel
            platform: mac
            target: dmg
            arch: x64
            timeout_minutes: 120
          - label: Linux x64
            runner: ubuntu-24.04
            platform: linux
            target: AppImage
            arch: x64
            timeout_minutes: 30
          - label: Windows x64
            runner: windows-2022
            platform: win
            target: nsis
            arch: x64
            timeout_minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.preflight.outputs.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: package.json

      - name: Install dependencies
        # Preflight already runs the full lifecycle-script install plus lint,
        # typecheck, and tests. Artifact jobs only need dependencies available.
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Align package versions to release version
        run: |
          node scripts/update-release-package-versions.ts "${{ needs.preflight.outputs.version }}"
          bun install --lockfile-only --ignore-scripts

      - name: Build macOS desktop artifact
        if: matrix.platform == 'mac'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          SCIENT_DESKTOP_UPDATE_REPOSITORY: ${{ needs.preflight.outputs.update_repository }}
          PUBLISH_RELEASE: ${{ needs.preflight.outputs.publish_release }}
          ALLOW_UNSIGNED_RELEASE: ${{ needs.preflight.outputs.unsigned_release }}
        run: |
          bash scripts/build-release-desktop-artifact.sh \
            "${{ matrix.platform }}" \
            "${{ matrix.target }}" \
            "${{ matrix.arch }}" \
            "${{ needs.preflight.outputs.version }}"

      - name: Upload macOS notarization evidence
        if: ${{ always() && matrix.platform == 'mac' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: notarization-${{ matrix.arch }}
          path: release/notarization-*.json
          if-no-files-found: warn
          retention-days: 30

      - name: Build Linux desktop artifact
        if: matrix.platform == 'linux'
        shell: bash
        env:
          SCIENT_DESKTOP_UPDATE_REPOSITORY: ${{ needs.preflight.outputs.update_repository }}
          PUBLISH_RELEASE: ${{ needs.preflight.outputs.publish_release }}
          ALLOW_UNSIGNED_RELEASE: ${{ needs.preflight.outputs.unsigned_release }}
        run: |
          bash scripts/build-release-desktop-artifact.sh \
            "${{ matrix.platform }}" \
            "${{ matrix.target }}" \
            "${{ matrix.arch }}" \
            "${{ needs.preflight.outputs.version }}"

      - name: Build Windows desktop artifact
        if: matrix.platform == 'win'
        shell: bash
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
          AZURE_TRUSTED_SIGNING_PUBLISHER_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_PUBLISHER_NAME }}
          SCIENT_DESKTOP_UPDATE_REPOSITORY: ${{ needs.preflight.outputs.update_repository }}
          PUBLISH_RELEASE: ${{ needs.preflight.outputs.publish_release }}
          ALLOW_UNSIGNED_RELEASE: ${{ needs.preflight.outputs.unsigned_release }}
        run: |
          bash scripts/build-release-desktop-artifact.sh \
            "${{ matrix.platform }}" \
            "${{ matrix.target }}" \
            "${{ matrix.arch }}" \
            "${{ needs.preflight.outputs.version }}"

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-publish

          shopt -s nullglob
          for pattern in \
            "release/*.dmg" \
            "release/*.zip" \
            "release/*.AppImage" \
            "release/*.exe" \
            "release/*.blockmap" \
            "release/latest*.yml"; do
            for file in $pattern; do
              cp "$file" release-publish/
            done
          done

          if [[ "${{ matrix.platform }}" == "mac" && "${{ matrix.arch }}" != "arm64" ]]; then
            if [[ -f release-publish/latest-mac.yml ]]; then
              mv release-publish/latest-mac.yml "release-publish/latest-mac-${{ matrix.arch }}.yml"
            fi
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-publish/*
          if-no-files-found: error

  publish_cli:
    name: Publish CLI to npm
    if: ${{ needs.preflight.outputs.publish_release == 'true' && vars.SCIENT_PUBLISH_CLI == '1' }}
    needs: [preflight, build]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: package.json
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        # Preflight already validates lifecycle scripts; the publish job only
        # needs dependencies available to build the package.
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Align package versions to release version
        run: node scripts/update-release-package-versions.ts "${{ needs.preflight.outputs.version }}"

      - name: Build CLI package
        run: bun run build --filter=@synara/web --filter=@scientfactory/cli

      - name: Publish CLI package
        run: node apps/server/scripts/cli.ts publish --tag latest --app-version "${{ needs.preflight.outputs.version }}" --verbose

  release:
    name: Publish GitHub Release
    if: ${{ needs.preflight.outputs.publish_release == 'true' }}
    needs: [preflight, build]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: package.json

      - name: Download all desktop artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: desktop-*
          merge-multiple: true
          path: release-assets

      - name: Merge macOS updater manifests
        run: |
          node scripts/merge-mac-update-manifests.ts \
            release-assets/latest-mac.yml \
            release-assets/latest-mac-x64.yml
          rm -f release-assets/latest-mac-x64.yml

      - name: Prepare updater feed metadata
        run: node scripts/prepare-release-update-feed.ts release-assets

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets

          mapfile -d '' payloads < <(
            find . -maxdepth 1 -type f \
              \( -name '*.dmg' -o -name '*.zip' -o -name '*.AppImage' -o -name '*.exe' \) \
              -print0 | sort -z
          )
          if [[ "${#payloads[@]}" -eq 0 ]]; then
            echo "No desktop payloads found for checksum generation." >&2
            exit 1
          fi

          printf '%s\0' "${payloads[@]}" | xargs -0 sha256sum | sed 's#  \./#  #' > SHA256SUMS.txt
          test -s SHA256SUMS.txt

      - name: Verify public download contract
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.preflight.outputs.version }}
          UPDATE_CHANNEL: ${{ needs.preflight.outputs.update_channel }}
        run: |
          set -euo pipefail
          cd release-assets

          required_assets=(
            "Scient-${RELEASE_VERSION}-arm64.dmg"
            "Scient-${RELEASE_VERSION}-x64.dmg"
            "Scient-${RELEASE_VERSION}-arm64.zip"
            "Scient-${RELEASE_VERSION}-x64.zip"
            "Scient-${RELEASE_VERSION}-x64.exe"
            "Scient-${RELEASE_VERSION}-x86_64.AppImage"
            "latest-mac.yml"
            "latest.yml"
            "latest-linux.yml"
            "${UPDATE_CHANNEL}-mac.yml"
            "${UPDATE_CHANNEL}.yml"
            "${UPDATE_CHANNEL}-linux.yml"
            "SHA256SUMS.txt"
          )

          for asset in "${required_assets[@]}"; do
            if [[ ! -s "$asset" ]]; then
              echo "Release is missing required public asset: $asset" >&2
              exit 1
            fi
          done

          required_payloads=(
            "Scient-${RELEASE_VERSION}-arm64.dmg"
            "Scient-${RELEASE_VERSION}-x64.dmg"
            "Scient-${RELEASE_VERSION}-arm64.zip"
            "Scient-${RELEASE_VERSION}-x64.zip"
            "Scient-${RELEASE_VERSION}-x64.exe"
            "Scient-${RELEASE_VERSION}-x86_64.AppImage"
          )
          for payload in "${required_payloads[@]}"; do
            if ! grep -Eq "^[0-9a-f]{64}  ${payload}$" SHA256SUMS.txt; then
              echo "Checksum manifest is missing $payload." >&2
              exit 1
            fi
          done

      - name: Prevent compatibility channel rollback
        if: ${{ needs.preflight.outputs.release_lane == 'bridge' }}
        env:
          GH_TOKEN: ${{ github.token }}
          BRIDGE_TAG: ${{ needs.preflight.outputs.bridge_tag }}
          BRIDGE_VERSION: ${{ needs.preflight.outputs.version }}
          UPDATE_CHANNEL: ${{ needs.preflight.outputs.update_channel }}
        run: |
          set -euo pipefail

          if ! bridge_release_json="$(
            gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${BRIDGE_TAG}" 2>&1
          )"; then
            if grep -q "HTTP 404" <<< "$bridge_release_json"; then
              exit 0
            fi
            echo "$bridge_release_json" >&2
            exit 1
          fi
          bridge_release_id="$(jq -r .id <<< "$bridge_release_json")"

          bridge_assets="$(
            gh api --paginate \
              "repos/${GITHUB_REPOSITORY}/releases/${bridge_release_id}/assets?per_page=100" \
              --jq '.[].name'
          )"
          channel_manifests=(
            "${UPDATE_CHANNEL}-mac.yml"
            "${UPDATE_CHANNEL}.yml"
            "${UPDATE_CHANNEL}-linux.yml"
          )
          existing_manifests=()
          for manifest in "${channel_manifests[@]}"; do
            if grep -Fxq "$manifest" <<< "$bridge_assets"; then
              existing_manifests+=("$manifest")
            fi
          done

          if [[ "${#existing_manifests[@]}" -eq 0 ]]; then
            exit 0
          fi
          if [[ "${#existing_manifests[@]}" -ne "${#channel_manifests[@]}" ]]; then
            echo "Compatibility feed has a partial dedicated-channel manifest set: ${existing_manifests[*]}." >&2
            exit 1
          fi

          manifest_directory="$(mktemp -d)"
          trap 'rm -rf "$manifest_directory"' EXIT
          for manifest in "${channel_manifests[@]}"; do
            gh release download "$BRIDGE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern "$manifest" \
              --dir "$manifest_directory"
            manifest_version="$(
              sed -n 's/^version:[[:space:]]*//p' "$manifest_directory/$manifest" \
                | head -n 1 \
                | tr -d "[:space:]'\""
            )"
            if [[ "$manifest_version" != "$BRIDGE_VERSION" ]]; then
              echo "Refusing to replace $manifest version ${manifest_version:-unknown} with compatibility version $BRIDGE_VERSION." >&2
              exit 1
            fi
          done

      - name: Recheck pinned compatibility feed
        if: ${{ needs.preflight.outputs.release_lane == 'clean' && needs.preflight.outputs.mirror_to_stable_channel == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          BRIDGE_TAG: ${{ needs.preflight.outputs.bridge_tag }}
        run: |
          actual_latest="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)"
          if [[ "$actual_latest" != "$BRIDGE_TAG" ]]; then
            echo "Expected GitHub Latest to remain pinned to $BRIDGE_TAG, got $actual_latest." >&2
            exit 1
          fi

      - name: Prepare release notice
        shell: bash
        env:
          UNSIGNED_RELEASE: ${{ needs.preflight.outputs.unsigned_release }}
        run: |
          if [[ "$UNSIGNED_RELEASE" == "true" ]]; then
            printf '%s\n' \
              '> [!WARNING]' \
              '> This early-access release includes an unsigned Windows installer, which may show an Unknown Publisher warning. macOS artifacts remain Developer ID signed, notarized, and stapled.' \
              > release-notice.md
          else
            : > release-notice.md
          fi

      - name: Publish release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: Scient v${{ needs.preflight.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ needs.preflight.outputs.is_prerelease }}
          make_latest: ${{ needs.preflight.outputs.make_latest }}
          body_path: release-notice.md
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.AppImage
            release-assets/*.exe
            release-assets/*.blockmap
            release-assets/*.yml
            release-assets/SHA256SUMS.txt
          fail_on_unmatched_files: true

      - name: Mirror Scient artifacts onto the pinned updater feed
        if: ${{ needs.preflight.outputs.mirror_to_stable_channel == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          BRIDGE_TAG: ${{ needs.preflight.outputs.bridge_tag }}
          UPDATE_CHANNEL: ${{ needs.preflight.outputs.update_channel }}
        run: |
          set -euo pipefail

          actual_latest="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)"
          if [[ "$actual_latest" != "$BRIDGE_TAG" ]]; then
            echo "Expected GitHub Latest to remain pinned to $BRIDGE_TAG, got $actual_latest." >&2
            exit 1
          fi

          shopt -s nullglob
          payloads=(
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.AppImage
            release-assets/*.exe
            release-assets/*.blockmap
          )
          manifests=(
            "release-assets/${UPDATE_CHANNEL}-mac.yml"
            "release-assets/${UPDATE_CHANNEL}.yml"
            "release-assets/${UPDATE_CHANNEL}-linux.yml"
          )

          if [[ "${#payloads[@]}" -eq 0 ]]; then
            echo "No desktop payloads found for the pinned updater feed." >&2
            exit 1
          fi
          for manifest in "${manifests[@]}"; do
            if [[ ! -f "$manifest" ]]; then
              echo "Missing updater manifest: $manifest" >&2
              exit 1
            fi
          done

          # Payloads must exist before a manifest is visible, otherwise an
          # updater can observe a version whose installer is not uploaded yet.
          gh release upload "$BRIDGE_TAG" "${payloads[@]}" --clobber --repo "$GITHUB_REPOSITORY"
          gh release upload "$BRIDGE_TAG" "${manifests[@]}" --clobber --repo "$GITHUB_REPOSITORY"

          actual_latest="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)"
          if [[ "$actual_latest" != "$BRIDGE_TAG" ]]; then
            echo "Pinned updater feed moved during publication: $actual_latest." >&2
            exit 1
          fi

  verify_published_macos:
    name: Verify published macOS ${{ matrix.arch }}
    if: ${{ needs.preflight.outputs.publish_release == 'true' }}
    needs: [preflight, release]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x64
            runner: macos-15-intel
    steps:
      - name: Checkout exact release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Download published macOS artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
          RELEASE_VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p published-macos
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "Scient-${RELEASE_VERSION}-${{ matrix.arch }}.dmg" \
            --pattern "Scient-${RELEASE_VERSION}-${{ matrix.arch }}.zip" \
            --pattern SHA256SUMS.txt \
            --dir published-macos

      - name: Verify checksum and delivered macOS identity
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          set -euo pipefail
          for extension in dmg zip; do
            asset="Scient-${RELEASE_VERSION}-${{ matrix.arch }}.${extension}"
            expected_line="$(grep -F "  ${asset}" published-macos/SHA256SUMS.txt | head -n 1 || true)"
            if [[ -z "$expected_line" ]]; then
              echo "Published checksum manifest is missing $asset." >&2
              exit 1
            fi
            (
              cd published-macos
              printf '%s\n' "$expected_line" | shasum -a 256 -c -
            )
          done
          bun scripts/verify-mac-release-artifact.ts published-macos

  finalize:
    name: Finalize release
    if: ${{ needs.preflight.outputs.publish_release == 'true' && vars.SCIENT_FINALIZE_RELEASE == '1' }}
    needs: [preflight, verify_published_macos]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - id: app_token
        name: Mint release app token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}
          persist-credentials: true

      - id: app_bot
        name: Resolve GitHub App bot identity
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          APP_SLUG: ${{ steps.app_token.outputs.app-slug }}
        run: |
          user_id="$(gh api "/users/${APP_SLUG}[bot]" --jq .id)"
          echo "name=${APP_SLUG}[bot]" >> "$GITHUB_OUTPUT"
          echo "email=${user_id}+${APP_SLUG}[bot]@users.noreply.github.com" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: package.json

      - id: update_versions
        name: Update version strings
        env:
          RELEASE_VERSION: ${{ needs.preflight.outputs.version }}
        run: node scripts/update-release-package-versions.ts "$RELEASE_VERSION" --github-output

      - name: Format package.json files
        if: steps.update_versions.outputs.changed == 'true'
        run: bunx oxfmt apps/server/package.json apps/desktop/package.json apps/web/package.json packages/contracts/package.json

      - name: Refresh lockfile
        if: steps.update_versions.outputs.changed == 'true'
        run: bun install --lockfile-only --ignore-scripts

      - name: Commit and push version bump
        if: steps.update_versions.outputs.changed == 'true'
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          if git diff --quiet -- apps/server/package.json apps/desktop/package.json apps/web/package.json packages/contracts/package.json bun.lock; then
            echo "No version changes to commit."
            exit 0
          fi

          git config user.name "${{ steps.app_bot.outputs.name }}"
          git config user.email "${{ steps.app_bot.outputs.email }}"

          git add apps/server/package.json apps/desktop/package.json apps/web/package.json packages/contracts/package.json bun.lock
          git commit -m "chore(release): prepare $RELEASE_TAG"
          git push origin HEAD:main
