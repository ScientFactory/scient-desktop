<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}}</title>
    <style>
      :root {
        color-scheme: light dark;
        --background: #fbfbfa;
        --surface: #ffffff;
        --text: #202124;
        --muted: #5f6368;
        --border: #d9dce1;
        --accent: #315f72;
        --accent-soft: #eef4f6;
        --warning: #8a4b16;
        --warning-soft: #fff5e8;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --background: #161819;
          --surface: #1f2224;
          --text: #eef0f2;
          --muted: #b5bbc1;
          --border: #3b4045;
          --accent: #8fc5d8;
          --accent-soft: #1d3038;
          --warning: #f2b879;
          --warning-soft: #382819;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--background);
        color: var(--text);
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Arial,
          sans-serif;
        font-size: 17px;
        line-height: 1.75;
      }

      main {
        width: min(100% - 2rem, 48rem);
        margin: 0 auto;
        padding: 3rem 0 5rem;
      }

      header {
        border-bottom: 1px solid var(--border);
        padding-bottom: 1.5rem;
        margin-bottom: 2rem;
      }

      h1,
      h2,
      h3 {
        line-height: 1.3;
        text-wrap: balance;
      }

      h1 {
        margin: 0.25rem 0 0.75rem;
        font-size: clamp(2rem, 7vw, 3rem);
      }

      h2 {
        margin-top: 2.25rem;
        font-size: 1.4rem;
      }

      h3 {
        margin-top: 1.5rem;
        font-size: 1.1rem;
      }

      p,
      ul,
      ol {
        margin-block: 0.75rem;
      }

      .context,
      .source-note {
        color: var(--muted);
      }

      .key-point,
      .caution {
        margin: 1.25rem 0;
        padding: 0.85rem 1rem;
        border-inline-start: 4px solid var(--accent);
        background: var(--accent-soft);
      }

      .caution {
        border-inline-start-color: var(--warning);
        background: var(--warning-soft);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin: 1rem 0;
        font-size: 0.95rem;
      }

      th,
      td {
        padding: 0.6rem;
        border: 1px solid var(--border);
        text-align: start;
        vertical-align: top;
      }

      a {
        color: var(--accent);
        text-underline-offset: 0.15em;
      }

      bdi,
      code,
      .ltr {
        direction: ltr;
        unicode-bidi: isolate;
      }

      @media print {
        :root {
          color-scheme: light;
          --background: #ffffff;
          --surface: #ffffff;
          --text: #202124;
          --muted: #5f6368;
          --border: #d9dce1;
          --accent: #315f72;
          --accent-soft: #eef4f6;
          --warning: #8a4b16;
          --warning-soft: #fff5e8;
        }

        body {
          background: var(--background);
        }

        main {
          width: 100%;
          padding: 0;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <p class="context">{{COURSE_OR_TOPIC}}</p>
        <h1>{{TITLE}}</h1>
        <p>{{PURPOSE}}</p>
      </header>

      <section>
        <h2>מה צריך להבין</h2>
        <p>{{FOUNDATION}}</p>
      </section>

      <section>
        <h2>הרעיון המרכזי</h2>
        <p>{{EXPLANATION}}</p>
        <aside class="key-point"><strong>חשוב לזכור:</strong> {{KEY_POINT}}</aside>
      </section>

      <section>
        <h2>הבחנות חשובות</h2>
        <p>{{DISTINCTIONS}}</p>
      </section>

      <section>
        <h2>בדיקה עצמית</h2>
        <ol>
          <li>{{RECALL_PROMPT}}</li>
        </ol>
      </section>

      <section>
        <h2>מקורות</h2>
        <ol class="source-note">
          <li>{{SOURCE}}</li>
        </ol>
      </section>
    </main>
  </body>
</html>
