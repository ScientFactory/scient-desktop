<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scient interactive HTML preview smoke test</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #0d0b12;
        color: #faf7ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
        background:
          radial-gradient(circle at 80% 0%, rgba(174, 118, 255, 0.25), transparent 36rem), #0d0b12;
      }

      main {
        width: min(680px, 100%);
        padding: 40px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 24px;
        background: rgba(25, 20, 33, 0.94);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
      }

      .eyebrow {
        color: #c39aff;
        font-size: 12px;
        font-weight: 750;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 10px 0 12px;
        font-size: clamp(34px, 7vw, 58px);
        line-height: 1;
        letter-spacing: -0.045em;
      }

      p {
        color: #bcb3ca;
        font-size: 17px;
        line-height: 1.6;
      }

      .counter {
        margin: 28px 0 18px;
        font-size: 72px;
        font-weight: 800;
        font-variant-numeric: tabular-nums;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        background: #c39aff;
        color: #1c102c;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      .status {
        margin-top: 24px;
        padding: 13px 15px;
        border: 1px solid rgba(195, 154, 255, 0.2);
        border-radius: 12px;
        background: rgba(195, 154, 255, 0.07);
        color: #e2cffd;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Scient · local HTML browser test</div>
      <h1>Interactive preview passed</h1>
      <p>The counter below is driven by inline JavaScript inside the local HTML browser.</p>
      <div id="counter" class="counter" aria-live="polite">0</div>
      <button id="reset" type="button">Reset counter</button>
      <div id="status" class="status">JavaScript initialized inside the preview origin.</div>
    </main>
    <script>
      const counter = document.querySelector("#counter");
      const reset = document.querySelector("#reset");
      const status = document.querySelector("#status");
      let value = 0;

      const render = () => {
        counter.textContent = String(value);
      };

      const timer = window.setInterval(() => {
        value += 1;
        render();
      }, 1000);

      reset.addEventListener("click", () => {
        value = 0;
        render();
        status.textContent = "Reset worked. The local page remains interactive.";
      });

      window.addEventListener("pagehide", () => window.clearInterval(timer), { once: true });
    </script>
  </body>
</html>
