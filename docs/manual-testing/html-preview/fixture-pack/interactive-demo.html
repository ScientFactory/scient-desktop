<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Interactive preview fixture</title>
    <style>
      body {
        max-width: 720px;
        margin: 48px auto;
        padding: 0 20px;
        font:
          17px/1.5 system-ui,
          sans-serif;
        color: #172b4d;
      }
      button {
        padding: 10px 16px;
        border: 0;
        border-radius: 8px;
        color: white;
        background: #155eef;
        font: inherit;
        cursor: pointer;
      }
      #secret {
        margin-top: 18px;
        padding: 14px;
        border-radius: 8px;
        background: #e9fbf3;
      }
      .hidden {
        display: none;
      }
      input {
        padding: 9px;
        border: 1px solid #aab7c8;
        border-radius: 6px;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <h1>Interactive preview fixture</h1>
    <p>This page should be fully interactive whenever it is opened in Scient.</p>
    <p>Count: <strong id="count">0</strong></p>
    <button id="countButton">Add one</button>
    <button id="revealButton">Show detail</button>
    <div id="secret" class="hidden">Success: JavaScript and page state are working.</div>
    <h2>Validation</h2>
    <form id="form">
      <input id="name" aria-label="Name" placeholder="Enter a name" /><button>Submit</button>
    </form>
    <p id="message" aria-live="polite"></p>
    <h2>Local site capabilities</h2>
    <ul>
      <li id="moduleStatus">Module: waiting</li>
      <li id="fetchStatus">Fetch: waiting</li>
      <li id="workerStatus">Worker: waiting</li>
    </ul>
    <p><a href="linked-page.html">Open the linked local page</a></p>
    <script>
      let count = 0;
      document.querySelector("#countButton").onclick = () =>
        (document.querySelector("#count").textContent = ++count);
      document.querySelector("#revealButton").onclick = () =>
        document.querySelector("#secret").classList.remove("hidden");
      document.querySelector("#form").onsubmit = (event) => {
        event.preventDefault();
        const name = document.querySelector("#name").value.trim();
        document.querySelector("#message").textContent = name
          ? `Hello, ${name}.`
          : "Please enter a name.";
      };
    </script>
    <script type="module" src="interactive-module.js"></script>
  </body>
</html>
