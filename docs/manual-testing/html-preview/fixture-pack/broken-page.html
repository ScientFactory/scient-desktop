<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Graceful failure fixture</title>
    <style>
      body {
        font: 17px system-ui;
        margin: 48px;
        color: #3d1c1c;
      }
      img {
        max-width: 420px;
        border: 2px dashed #bd5b5b;
      }
    </style>
  </head>
  <body>
    <h1>Graceful failure fixture</h1>
    <p>
      This page intentionally references an image that does not exist. The text should still render
      and the preview should not crash.
    </p>
    <img src="missing-image-does-not-exist.png" alt="Intentionally missing image" />
    <div><strong>Visible after the missing resource</strong></div>
  </body>
</html>
