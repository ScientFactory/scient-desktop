<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Static brochure fixture</title>
    <style>
      body {
        font:
          16px/1.5 system-ui,
          sans-serif;
        margin: 0;
        color: #18324b;
        background: #f6f8fb;
      }
      header {
        padding: 56px 12%;
        color: white;
        background: linear-gradient(135deg, #155eef, #1eaa7a);
      }
      main {
        max-width: 850px;
        margin: 28px auto;
        padding: 0 20px 40px;
      }
      section {
        background: white;
        margin: 18px 0;
        padding: 24px;
        border-radius: 14px;
        box-shadow: 0 3px 18px #18324b18;
      }
      img {
        max-width: 100%;
        border-radius: 10px;
        background: #eaf1ff;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 10px;
        text-align: left;
        border-bottom: 1px solid #dce3ee;
      }
      th {
        color: #155eef;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Northwind Field Notes</h1>
      <p>A static HTML preview fixture</p>
    </header>
    <main>
      <section>
        <h2>What this checks</h2>
        <p>
          Typography, color, layout, a local image, and a table should all render without any
          interaction.
        </p>
      </section>
      <section>
        <img src="local-illustration.svg" alt="Abstract blue and green landscape illustration" />
      </section>
      <section>
        <h2>Sample milestones</h2>
        <table>
          <thead>
            <tr>
              <th>Stage</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Discovery</td>
              <td>Complete</td>
            </tr>
            <tr>
              <td>Prototype</td>
              <td>Ready</td>
            </tr>
            <tr>
              <td>Review</td>
              <td>Scheduled</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
  </body>
</html>
