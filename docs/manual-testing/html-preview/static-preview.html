<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scient static HTML preview smoke test</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #0b0d10;
        color: #f7f8fa;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
        background:
          radial-gradient(circle at 18% 0%, rgba(77, 225, 170, 0.2), transparent 36rem), #0b0d10;
      }

      main {
        width: min(680px, 100%);
        padding: 40px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 24px;
        background: rgba(21, 25, 30, 0.92);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }

      .eyebrow {
        color: #65e6b5;
        font-size: 12px;
        font-weight: 750;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 10px 0 12px;
        font-size: clamp(34px, 7vw, 58px);
        line-height: 1;
        letter-spacing: -0.045em;
      }

      p {
        color: #afb7c2;
        font-size: 17px;
        line-height: 1.6;
      }

      ul {
        display: grid;
        gap: 12px;
        margin: 28px 0 0;
        padding: 0;
        list-style: none;
      }

      li {
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 14px 16px;
        border: 1px solid rgba(101, 230, 181, 0.18);
        border-radius: 12px;
        background: rgba(101, 230, 181, 0.06);
      }

      li::before {
        content: "✓";
        display: grid;
        width: 24px;
        height: 24px;
        place-items: center;
        border-radius: 50%;
        background: #65e6b5;
        color: #072219;
        font-weight: 900;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Scient · Windows smoke test</div>
      <h1>Static preview passed</h1>
      <p>
        If this card is visible inside Scient instead of a black page, the local HTML browser loaded
        successfully.
      </p>
      <ul>
        <li>HTML document rendered</li>
        <li>Inline CSS applied</li>
        <li>Typography and gradients rendered</li>
        <li>No JavaScript permission required</li>
      </ul>
    </main>
  </body>
</html>
